<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');

        :root {
            --color-primary: #000000;
            --color-primary-dark: #000000;
            --color-background: #050505;
            --color-surface: #111111;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-border: #222222;
            --color-accent: #ffffff;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text);
            font-family: var(--font-sans);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            width: 100%;
            position: fixed;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
        }

        .logo-container {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--color-text-muted);
        }

        .cta-pill {
            background: var(--color-accent);
            color: var(--color-primary);
            padding: 0.8rem 1.8rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            transition: transform 0.2s ease;
            border: none;
        }

        .cta-pill:hover {
            transform: scale(1.05);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 1.5rem 60px;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-top: 1.5rem;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: var(--color-text-muted);
            margin-top: 0.75rem;
            font-weight: 700;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #000000;
            padding: 0.5rem;
            border-radius: 999px;
            margin-bottom: 2.5rem;
            border: 1px solid var(--color-border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: var(--color-text-muted);
            font-family: var(--font-sans);
            font-weight: 800;
            cursor: pointer;
            border-radius: 999px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--color-accent);
            color: var(--color-primary);
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem;
            background: #000000;
            border: 1px solid var(--color-border);
            border-radius: 16px;
            color: var(--color-text);
            font-family: var(--font-sans);
            font-weight: 700;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--color-accent);
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--color-accent);
            color: var(--color-primary);
            border: none;
            border-radius: 999px;
            font-family: var(--font-sans);
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Footer */
        footer {
            padding: 4rem 5%;
            background: #000000;
            border-top: 1px solid var(--color-border);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--color-text);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: var(--color-text-muted);
            transition: fill 0.3s ease;
        }

        .social-icons svg:hover {
            fill: var(--color-accent);
        }

        .copyright {
            color: var(--color-text-muted);
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .navbar {
                padding: 1rem 5%;
            }
            .nav-links {
                display: none;
            }
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }
            .auth-header h1 {
                font-size: 2rem;
            }
        }
    </style>
  <base href="/enterprise-ai-strategy/" />
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <img src="logo-test-yan-13.png" alt="test-yan-13 logo" style="height:40px;object-fit:contain">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="auth.html" class="cta-pill">Sign In</a>
        </div>
    </nav>

    <main>
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <img src="logo-test-yan-13.png" alt="test-yan-13 logo" style="height:32px;object-fit:contain">
                </div>
                <h1 id="auth-title">Scale with AI</h1>
                <p id="auth-subtitle">Join the elite network of enterprise leaders.</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab-trigger="signup">Sign Up</button>
                <button class="tab-btn" data-tab-trigger="signin">Sign In</button>
            </div>

            <!-- Sign Up Tab Content -->
            <div id="signup-content" class="tab-content active">
                <form data-backend="signup">
                    <input type="hidden" name="role" value="user">
                    <div class="form-group">
                        <label for="signup-email">Enterprise Email</label>
                        <input type="email" id="signup-email" name="email" placeholder="executive@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Secure Password</label>
                        <input type="password" id="signup-password" name="password" minlength="6" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Initialize Account</button>
                    <p data-success style="display:none; color: #ffffff; background: #008800; padding: 1rem; border-radius: 12px; font-weight: bold; margin-top: 1.5rem; text-align: center;">
                        Success! Profile created. Redirecting to login...
                    </p>
                </form>
            </div>

            <!-- Sign In Tab Content -->
            <div id="signin-content" class="tab-content">
                <form id="signin-form">
                    <div class="form-group">
                        <label for="signin-email">Email Address</label>
                        <input type="email" id="signin-email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signin-password">Password</label>
                        <input type="password" id="signin-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Access Dashboard</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="auth.html">Sign In</a>
        </div>

                <svg viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
            </a>
        </div>
        <p class="copyright">© 2026 test-yan-13. All rights reserved.</p>
    </footer>

    <script>
        // Tab Switching Logic
        const tabTriggers = document.querySelectorAll('[data-tab-trigger]');
        const tabContents = document.querySelectorAll('.tab-content');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');

        function setActiveTab(tabId) {
            tabTriggers.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab-trigger') === tabId);
            });
            tabContents.forEach(content => {
                content.classList.toggle('active', content.id === `${tabId}-content`);
            });

            if (tabId === 'signin') {
                authTitle.innerText = 'Welcome Back';
                authSubtitle.innerText = 'Resume your AI transformation journey.';
            } else {
                authTitle.innerText = 'Scale with AI';
                authSubtitle.innerText = 'Join the elite network of enterprise leaders.';
            }
        }

        tabTriggers.forEach(trigger => {
            trigger.addEventListener('click', () => {
                setActiveTab(trigger.getAttribute('data-tab-trigger'));
            });
        });

        // Watch for success message to auto-switch tabs
        const successMsg = document.querySelector('[data-success]');
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    if (successMsg.style.display === 'block') {
                        setTimeout(() => {
                            setActiveTab('signin');
                            // Reset form after switching
                            successMsg.style.display = 'none';
                            const btn = document.querySelector('form[data-backend="signup"] button[type="submit"]');
                            if (btn) btn.style.display = 'block';
                        }, 2000);
                    }
                }
            });
        });

        observer.observe(successMsg, { attributes: true });

        // Backend script snippet
        (function() {
          var BACKEND = 'http://localhost:3000/api';
          var TOKEN = '8325bda99d5a82329102e53df8793a6f25e408c772decd83ac9183f863736af6';
          var DOMAIN = 'enterpriseaistrategy.com';
          var HEADERS = { 'Content-Type': 'application/json', 'X-Token': TOKEN, 'X-Domain': DOMAIN };

          document.addEventListener('submit', function(e) {
            var form = e.target.closest('form[data-backend="signup"]');
            if (!form) return;
            e.preventDefault();
            
            var data = {};
            new FormData(form).forEach(function(v, k) { data[k] = v; });

            var btn = form.querySelector('button[type="submit"]');
            var originalText = '';
            if (btn) {
              originalText = btn.innerText;
              btn.innerText = 'Sending...';
              btn.disabled = true;
            }

            fetch(BACKEND + '/users', {
              method: 'POST',
              headers: HEADERS,
              body: JSON.stringify(data)
            }).then(function(r) { return r.json(); }).then(function(res) {
              if (res.success) {
                var msg = form.querySelector('[data-success]');
                if (msg) { msg.style.display = 'block'; }
                form.reset();
                if (btn) btn.style.display = 'none';
              } else {
                alert(res.error || 'Failed to sign up');
                if (btn) { btn.innerText = originalText; btn.disabled = false; }
              }
            }).catch(function(){
              alert('Network error occurred');
              if (btn) { btn.innerText = originalText; btn.disabled = false; }
            });
          });
        })();
    </script>
